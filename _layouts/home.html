---
layout: default
---
<h1>{{ site.title }}</h1>
<p>{{ site.description }}</p>

{% for post in site.posts %}
  <article>
    <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
    <p class="meta">{{ post.date | date_to_string }}</p>
    {{ post.excerpt }}
  </article>
{% endfor %}
